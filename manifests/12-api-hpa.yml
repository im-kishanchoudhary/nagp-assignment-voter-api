apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: voter-api-hpa
  namespace: voter
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: voter-api
  minReplicas: 4
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
